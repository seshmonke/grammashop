# Подхватывается docker compose автоматически вместе с docker-compose.yml
# (без явного -f) — параметры, нужные только для локальной разработки:
# сборка образов из исходников и публикация портов на хост. Прод использует
# docker-compose.prod.yml вместо этого файла (образы из ghcr.io, без
# публикации портов api/web/postgres — см. STACK.md#хостинг-и-деплой).
services:
  postgres:
    ports:
      - "5432:5432"

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    ports:
      - "3000:3000"
    environment:
      # Локальный dev перебивает NODE_ENV=production из образа (apps/api/
      # Dockerfile) — иначе dev-байпас проверки подписи initData мёртв (см.
      # STACK.md#авторизация). Прод-профиль (docker-compose.prod.yml) этот
      # override не подхватывает, там остаётся production из образа.
      NODE_ENV: ${NODE_ENV:-development}
      # Dev-режим авторизации: /auth принимает mock-initData без подписи.
      # Только здесь, в override — прод-профилю флаг недоступен в принципе.
      AUTH_DEV_MODE: ${AUTH_DEV_MODE:-}

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    ports:
      - "5173:80"
