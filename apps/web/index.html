<!doctype html>
<html lang="ru">
  <head>
    <meta charset="utf-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, viewport-fit=cover"
    />
    <title>grammashop</title>
    <!-- OG-теги продублированы из landing.html: превью-боты (Telegram,
         соцсети) не исполняют JS, поэтому редирект на /landing.html им не
         помогает — они видят только статический <head> того, что реально
         отдаётся на "/" (см. TASKS.md, Спринт 15). -->
    <meta name="description" content="Оформи подписку — получи ссылку на витрину в Telegram. Без BotFather, без своего сайта, без комиссии с продаж. От 1 ₽ в месяц." />
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="grammashop" />
    <meta property="og:title" content="grammashop — магазин в Telegram без своего бота" />
    <meta property="og:description" content="Оформи подписку — получи ссылку на витрину в Telegram. Без BotFather, без своего сайта, без комиссии с продаж. От 1 ₽ в месяц." />
    <meta property="og:image" content="https://grammashop.online/og-image.png" />
    <meta property="og:url" content="https://grammashop.online/" />
    <meta name="twitter:card" content="summary_large_image" />
    <link rel="icon" href="/logo.svg" type="image/svg+xml" />
    <!-- Unbounded: только дисплейные моменты витрины (заголовки, цены) —
         не тело интерфейса, см. docs/design/DESIGN_SYSTEM.md#типографика. -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Unbounded:wght@500..900&display=swap" rel="stylesheet" />
    <!-- Telegram WebApp SDK: создаёт window.Telegram.WebApp (initData,
         start_param, themeParams). Обязателен внутри Telegram; вне его
         initData пустой — фронт уходит в dev-mock (см. auth/init-data.ts). -->
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
