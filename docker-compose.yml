services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: grammashop
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./docker/postgres-init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    environment:
      API_PORT: "3000"
      DATABASE_URL: postgres://postgres:${POSTGRES_PASSWORD:-postgres}@postgres:5432/grammashop
      S3_ENDPOINT: ${S3_ENDPOINT:-}
      S3_REGION: ${S3_REGION:-}
      S3_BUCKET: ${S3_BUCKET:-}
      S3_ACCESS_KEY_ID: ${S3_ACCESS_KEY_ID:-}
      S3_SECRET_ACCESS_KEY: ${S3_SECRET_ACCESS_KEY:-}
      SENTRY_DSN_API: ${SENTRY_DSN_API:-}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}
      JWT_SECRET: ${JWT_SECRET:-}
      ADMIN_TELEGRAM_IDS: ${ADMIN_TELEGRAM_IDS:-}
      BACKUP_GPG_PASSPHRASE: ${BACKUP_GPG_PASSPHRASE:-}
      YOOKASSA_SHOP_ID: ${YOOKASSA_SHOP_ID:-}
      YOOKASSA_SECRET_KEY: ${YOOKASSA_SECRET_KEY:-}
      YOOKASSA_API_URL: ${YOOKASSA_API_URL:-}
      SUBSCRIPTION_AMOUNT_KOPECKS: ${SUBSCRIPTION_AMOUNT_KOPECKS:-}
      SUBSCRIPTION_RETURN_URL: ${SUBSCRIPTION_RETURN_URL:-}
      YOOKASSA_VERIFY_WEBHOOK_IP: ${YOOKASSA_VERIFY_WEBHOOK_IP:-}
      BILLING_WEBHOOK_RATE_LIMIT_MAX: ${BILLING_WEBHOOK_RATE_LIMIT_MAX:-}
      YANDEX_MONITORING_API_KEY: ${YANDEX_MONITORING_API_KEY:-}
      YANDEX_MONITORING_FOLDER_ID: ${YANDEX_MONITORING_FOLDER_ID:-}
    depends_on:
      postgres:
        condition: service_healthy

  web:
    depends_on:
      - api

volumes:
  pgdata:
