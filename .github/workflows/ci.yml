name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Два пуша в main подряд запускают два параллельных рана — без этого они
# гонялись за тегом `:latest` при публикации образов (более медленный
# ран мог запушить `:latest` последним и затереть свежий образ, деплой
# после этого стягивал устаревший код). Обнаружено 20.07.2026 на Спринте
# 18: `git pull --ff-only` на VM отработал верно, SHA-теги в GHCR были
# корректны, но `:latest` содержал сборку без панели импорта. Отменяем
# более старый ран на той же ветке — доезжает всегда только последний
# коммит, безопасно для соло-проекта.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: grammashop_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      DATABASE_URL_TEST: postgres://postgres:postgres@localhost:5432/grammashop_test
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - run: corepack enable

      - run: pnpm install --frozen-lockfile

      - run: pnpm --filter @grammashop/shared build

      - run: pnpm -r test

  build-and-push:
    needs: test
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/api/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository }}-api:${{ github.sha }}
            ghcr.io/${{ github.repository }}-api:latest

      - uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/web/Dockerfile
          push: true
          build-args: |
            VITE_API_URL=/api
            VITE_SENTRY_DSN_WEB=${{ secrets.SENTRY_DSN_WEB }}
          tags: |
            ghcr.io/${{ github.repository }}-web:${{ github.sha }}
            ghcr.io/${{ github.repository }}-web:latest

  deploy:
    needs: build-and-push
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.VM_SSH_KEY }}

      - run: ssh -o StrictHostKeyChecking=accept-new ${{ secrets.VM_USER }}@${{ secrets.VM_HOST }} '
          cd grammashop &&
          git pull --ff-only &&
          docker compose -f docker-compose.yml -f docker-compose.prod.yml pull &&
          docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d &&
          docker image prune -f
          '
